version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: casa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: casa_db
      POSTGRES_USER: casa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casa -d casa_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: casa_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: casa_backend
    restart: unless-stopped
    env_file:
      - ../apps/backend/.env
    environment:
      DATABASE_URL: postgresql://casa:${POSTGRES_PASSWORD}@postgres:5432/casa_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: casa_mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    ports:
      - "127.0.0.1:1883:1883"

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    container_name: casa_z2m
    restart: unless-stopped
    volumes:
      - ./zigbee2mqtt:/app/data
      - /run/udev:/run/udev:ro
    devices:
      - /dev/serial/by-id/usb-ITead_Sonoff_Zigbee_3.0_USB_Dongle_Plus_*:/dev/ttyUSB0
    environment:
      ZIGBEE2MQTT_DATA: /app/data
    depends_on:
      - mosquitto

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: casa_frigate
    restart: unless-stopped
    privileged: true
    shm_size: '128mb'
    volumes:
      - ./frigate/config.yml:/config/config.yml:ro
      - frigate_media:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:5000:5000"
      - "127.0.0.1:8554:8554"
    environment:
      FRIGATE_RTSP_PASSWORD: ${CAMERA_RTSP_PASSWORD:-}

  nginx:
    image: nginx:alpine
    container_name: casa_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/letsencrypt
    depends_on:
      - backend
      - frigate

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_logs:
  frigate_media:
  nginx_certs:
