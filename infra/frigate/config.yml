# Frigate NVR configuration
# See https://docs.frigate.video/configuration/ for full reference

mqtt:
  host: mosquitto
  port: 1883
  user: frigate
  password: "{FRIGATE_MQTT_PASSWORD}"

detectors:
  cpu:
    type: cpu

# Record all cameras
record:
  enabled: true
  retain:
    days: 7
    mode: all
  events:
    retain:
      default: 30
      mode: motion

# Snapshots on detection
snapshots:
  enabled: true
  timestamp: false
  bounding_box: true
  retain:
    default: 14

